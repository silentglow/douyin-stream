name: Feature request
description: Suggest a scoped improvement or new capability.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or painful today?
      placeholder: "When I ..., I need ..., but currently ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - Installation or deployment
        - Frontend UI
        - Download workflow
        - Transcription workflow
        - Account or quota management
        - Platform support
        - Developer tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or simpler options.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help test this.
        - label: I am willing to open a pull request for this.

