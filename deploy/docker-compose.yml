version: "3.8"
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../config:/app/config
      - ../logs:/app/logs
      - ../transcripts:/app/transcripts
    env_file:
      - ../.env
    restart: unless-stopped
